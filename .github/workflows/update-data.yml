name: Update GloFAS Data

on:
  # Manual trigger
  workflow_dispatch:
  
  # Scheduled run (daily at 06:17 UTC - odd minute to avoid scheduler collisions)
  schedule:
    - cron: '17 6 * * *'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run data update pipeline
        env:
          EWDS_API_URL: https://ewds.climate.copernicus.eu/api
          EWDS_API_KEY: ${{ secrets.EWDS_API_KEY }}
        run: |
          cd scripts
          python update_data.py
      
      - name: Check for changes
        id: check_changes
        run: |
          git add public/data/
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Update GloFAS data $(date -u +%Y-%m-%d)"
          git push
      
      - name: Cleanup temp files
        if: always()
        run: |
          rm -rf scripts/temp/
